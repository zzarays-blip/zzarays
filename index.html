<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교직원 도시락 주문</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;min-height:100vh;padding:1.5rem 1rem}
.wrap{max-width:680px;margin:0 auto}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.header p{font-size:14px;color:#888}
.notice-box{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
.notice-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.notice-title i{font-size:16px;color:#1D9E75}
.notice-grid{display:grid;grid-template-columns:1fr;gap:10px}
.notice-item{background:#f9f9f7;border:1px solid #e8e8e6;border-radius:8px;padding:10px 12px}
.notice-item .item-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #e8e8e6}
.notice-item ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.notice-item ul li{font-size:12px;color:#666;display:flex;align-items:center;gap:5px}
.notice-item ul li::before{content:\'\';display:inline-block;width:4px;height:4px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.deadline-bar{background:#fff;border:1px solid #e8e8e6;border-radius:8px;padding:10px 16px;display:none;align-items:center;gap:8px;margin-bottom:1.25rem;font-size:13px;color:#888}
.deadline-bar .dl-label{font-weight:600;color:#1a1a1a}
.card{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.card h2{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:#666}
.field input{height:44px;padding:0 12px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus{border-color:#1D9E75;background:#fff}
.section-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem}
.menu-card{background:#fff;border:1px solid #e8e8e6;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative;user-select:none}
.menu-card:hover{border-color:#1D9E75}
.menu-card.selected{border:2px solid #1D9E75}
.menu-img-wrap{width:100%;aspect-ratio:4/3;background:#f5f5f3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.menu-img-wrap img{width:100%;height:100%;object-fit:cover}
.menu-img-placeholder{display:flex;flex-direction:column;align-items:center;gap:5px;color:#bbb}
.menu-img-placeholder i{font-size:26px}
.menu-info{padding:10px 12px}
.menu-info .name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.menu-info .price{font-size:13px;color:#1D9E75;font-weight:600}
.check-badge{display:none;position:absolute;top:8px;right:8px;width:22px;height:22px;background:#1D9E75;border-radius:50%;align-items:center;justify-content:center;color:white;font-size:12px}
.menu-card.selected .check-badge{display:flex}
.submit-btn{width:100%;height:50px;background:#1D9E75;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.status{display:none;text-align:center;padding:1.25rem;border-radius:12px;margin-top:1rem;font-size:14px;white-space:pre-line}
.status.success{background:#E1F5EE;color:#0F6E56;border:1px solid #5DCAA5}
.status.error{background:#FAECE7;color:#993C1D;border:1px solid #F0997B}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.admin-toggle{text-align:right;margin-bottom:.75rem}
.admin-toggle button{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:4px 8px;font-family:inherit}
.admin-panel{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;display:none}
.admin-panel.open{display:block}
.admin-panel h3{font-size:15px;font-weight:600;margin-bottom:1rem;color:#1a1a1a}
.admin-section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.admin-deadline-row{display:flex;gap:8px;align-items:center}
.admin-deadline-row input{flex:1;height:38px;padding:0 10px;border-radius:8px;border:1px solid #ddd;background:#fafafa;color:#1a1a1a;font-size:14px;font-family:inherit;outline:none}
.apply-btn{height:38px;padding:0 14px;border-radius:8px;background:#1D9E75;color:white;border:none;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.closed-banner{background:#FAECE7;border:1px solid #F0997B;border-radius:12px;padding:1.5rem;text-align:center;display:none;margin-bottom:1.25rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="admin-toggle">
    <button onclick="toggleAdmin()"><i class="ti ti-settings"></i> 관리자 설정</button>
  </div>
  <div class="admin-panel" id="adminPanel">
    <h3>관리자 설정</h3>
    <div class="admin-section-title">마감 시간</div>
    <div class="admin-deadline-row">
      <input type="datetime-local" id="deadlineInput">
      <button class="apply-btn" onclick="applyDeadline()">적용</button>
    </div>
  </div>
  <div class="closed-banner" id="closedBanner">
    <i class="ti ti-clock-off" style="font-size:28px;color:#993C1D;display:block;margin-bottom:8px"></i>
    <p style="font-size:15px;font-weight:600;color:#993C1D">주문이 마감되었습니다</p>
    <p style="font-size:13px;color:#993C1D;margin-top:4px" id="closedMsg"></p>
  </div>
  <div id="orderForm">
    <div class="header">
      <h1>🍱 오늘의 도시락 주문</h1>
      <p id="dateLabel"></p>
    </div>
    <div class="notice-box">
      <div class="notice-title"><i class="ti ti-info-circle"></i> 상차림 안내</div>
      <div class="notice-grid">
        <div class="notice-item">
          <div class="item-name">국반상</div>
          <ul><li>메인메뉴</li><li>국</li><li>튀김 &amp; 전</li><li>한식반찬 2가지</li></ul>
        </div>
    </div>
    <div class="deadline-bar" id="deadlineBar">
      <i class="ti ti-clock"></i>
      주문 마감: <span class="dl-label" id="deadlineDisplay"></span>
      <span id="countdown" style="margin-left:auto;font-size:12px;font-weight:600;color:#D85A30"></span>
    </div>
    <div class="card">
      <h2>주문자 정보</h2>
      <div class="field">
        <label for="nameInput">이름</label>
        <input type="text" id="nameInput" placeholder="홍길동">
      </div>
      <div class="field">
        <label for="deptInput">학과 / 부서</label>
        <input type="text" id="deptInput" placeholder="과학부">
      </div>
    </div>
    <div class="section-label">메뉴 선택</div>
    <div class="menu-grid" id="menuGrid"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">주문하기</button>
    <div class="status" id="statusBox"></div>
  </div>
</div>

let selectedMenu = null, deadline = null, countdownTimer = null;

function init() {
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}) + ' 점심';
  renderMenus();
  const saved = localStorage.getItem('lunchDeadline');
  if (saved) { deadline = new Date(saved); applyDeadlineUI(); }
}

function renderMenus() {
  document.getElementById('menuGrid').innerHTML = menus.map((m,i) => `
    <div class="menu-card ${selectedMenu===i?'selected':''}" onclick="selectMenu(${i})">
      <div class="check-badge"><i class="ti ti-check"></i></div>
      <div class="menu-img-wrap">
        ${m.img ? `<img src="${m.img}" alt="${m.name}">` : `<div class="menu-img-placeholder"><i class="ti ti-salad"></i><span>이미지 없음</span></div>`}
      </div>
      <div class="menu-info">
        <div class="name">${m.name}</div>
        <div class="price">${m.price}</div>
      </div>
    </div>`).join('');
}

function selectMenu(i) {
  if (isDeadlinePassed()) return;
  selectedMenu = (selectedMenu===i) ? null : i;
  renderMenus();
}

function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('open'); }

function applyDeadline() {
  const val = document.getElementById('deadlineInput').value;
  if (!val) return;
  deadline = new Date(val);
  localStorage.setItem('lunchDeadline', deadline.toISOString());
  applyDeadlineUI();
}

function applyDeadlineUI() {
  document.getElementById('deadlineBar').style.display = 'flex';
  document.getElementById('deadlineDisplay').textContent =
    deadline.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  startCountdown(); checkDeadline();
}

function isDeadlinePassed() { return deadline && new Date() > deadline; }

function checkDeadline() {
  const closed = isDeadlinePassed();
  document.getElementById('closedBanner').style.display = closed ? 'block' : 'none';
  document.getElementById('orderForm').style.display = closed ? 'none' : 'block';
  if (closed) document.getElementById('closedMsg').textContent = deadline.toLocaleString('ko-KR') + ' 마감';
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const el = document.getElementById('countdown');
    if (!el || !deadline) return;
    const diff = deadline - new Date();
    if (diff <= 0) { el.textContent='마감'; checkDeadline(); clearInterval(countdownTimer); return; }
    const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    el.textContent = h>0?`${h}시간 ${m}분 남음`:m>0?`${m}분 ${s}초 남음`:`${s}초 남음`;
  }, 1000);
}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEF1jUNvqkrTiVDV8YvxayZSktwzTEenYrz5mY-VqfF1awDDzj9_lcl_YDo8Txn-6e/exec';

async function submitOrder() {
  const name = document.getElementById('nameInput').value.trim();
  const dept = document.getElementById('deptInput').value.trim();
  if (!name) { showStatus('이름을 입력해 주세요.','error'); return; }
  if (!dept) { showStatus('학과/부서를 입력해 주세요.','error'); return; }
  if (selectedMenu===null) { showStatus('메뉴를 선택해 주세요.','error'); return; }
  if (isDeadlinePassed()) { showStatus('주문 마감 시간이 지났습니다.','error'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>저장 중...';
  const menu = menus[selectedMenu];
  const row = {time:new Date().toLocaleString('ko-KR'), name, dept, menu:menu.name, price:menu.price};
  // Google Sheets 전송 (GET 방식으로 CORS 우회)
  try {
    const params = new URLSearchParams({
      time: row.time, name: row.name, dept: row.dept,
      menu: row.menu, price: row.price
    });
    await fetch(SCRIPT_URL + '?' + params.toString());
  } catch(e) {}

  const orders = JSON.parse(localStorage.getItem('lunchOrders')||'[]');
  orders.push(row); localStorage.setItem('lunchOrders', JSON.stringify(orders));
  showStatus(`주문 완료!\n${name} 선생님 · ${menu.name} (${menu.price})`, 'success');
  document.getElementById('nameInput').value='';
  document.getElementById('deptInput').value='';
  selectedMenu=null; renderMenus();
  btn.disabled=false; btn.innerHTML='주문하기';
}

function showStatus(msg,type) {
  const el=document.getElementById('statusBox');
  el.style.display='block'; el.className='status '+type; el.textContent=msg;
  setTimeout(()=>{el.style.display='none';},5000);
}

init();
</script>
</body>
</html>
